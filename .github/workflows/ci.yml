name: Full-Stack CI Audit

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Clean Install Project Dependencies
        run: npm ci

      - name: Run Static Code Analysis & TypeScript Audit
        run: npm run lint

      - name: Validate Production Build Compilation
        run: npm run build
        env:
          NODE_ENV: production
