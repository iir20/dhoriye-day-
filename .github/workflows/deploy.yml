name: Build & Launch Production App

on:
  push:
    branches: [ main, master ]

# Permissions needed to push to GitHub Container Registry (GHCR) and GitHub Pages securely
permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs in progress
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract repository metadata (tags, labels) for Docker
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      # Build and push the Docker image to GHCR
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # STEP: Launch / Redeploy Triggers
      # This demonstrates how to cleanly trigger instant deployments to services like Render or Railway.
      # Users can configure a secret named "RENDER_DEPLOY_HOOK_URL" in their Repository Secrets.
      - name: Trigger Automated Production Launch on Render
        if: env.RENDER_DEPL_HOOK != ''
        env:
          RENDER_DEPL_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          echo "🚀 Triggering automatic production rollout of the new Docker container..."
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "✅ Production rollout trigger completed successful!"

  deploy-github-pages:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Static App Single-Page Assets
        run: npm run build
        env:
          NODE_ENV: production

      - name: Setup GitHub Pages Environment
        uses: actions/configure-pages@v4

      - name: Upload Built Dist Static Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy Compiled Web Application to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
